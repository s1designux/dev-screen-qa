<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>디자인 vs 개발 · 비교 리포트</title>
<style>
  :root{
    --pass:#16A34A; --warn:#D97706; --fail:#DC2626;
    --bg:#F9FAFB; --card:#fff; --border:#E5E7EB; --text:#1F2937; --muted:#6B7280;
    --font:"Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);padding:24px;line-height:1.5;}
  h1{font-size:22px;margin-bottom:4px;}
  .sub{color:var(--muted);font-size:14px;margin-bottom:20px;}

  .loader{display:flex;gap:16px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:16px;margin-bottom:20px;}
  .loader label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .loader .field{min-width:240px;}
  input[type=file]{font-size:13px;}

  .summary{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:110px;}
  .chip .n{font-size:24px;font-weight:700;}
  .chip .t{font-size:12px;color:var(--muted);}
  .chip.pass .n{color:var(--pass);}
  .chip.warn .n{color:var(--warn);}
  .chip.fail .n{color:var(--fail);}

  .toolbar{margin-bottom:12px;font-size:14px;}
  .toolbar label{cursor:pointer;user-select:none;}

  .el{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;}
  .el-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;}
  .el-head .name{font-weight:700;font-size:15px;}
  .el-head .badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;color:#fff;}
  .badge.pass{background:var(--pass);}
  .badge.warn{background:var(--warn);}
  .badge.fail{background:var(--fail);}
  .badge.miss{background:#6B7280;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:8px 16px;border-top:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;background:#FAFAFA;}
  td.k{color:var(--muted);width:160px;}
  td.v{font-variant-numeric:tabular-nums;}
  tr.pass td.j{color:var(--pass);}
  tr.warn td.j{color:var(--warn);font-weight:700;}
  tr.fail td.j{color:var(--fail);font-weight:700;}
  tr.fail td.v.dev, tr.warn td.v.dev{background:#FEF2F2;}
  .swatch{display:inline-block;width:12px;height:12px;border-radius:3px;border:1px solid #0002;vertical-align:middle;margin-right:6px;}
  .note{padding:12px 16px;color:var(--muted);font-size:13px;}
  .empty{background:var(--card);border:1px dashed var(--border);border-radius:12px;padding:40px;text-align:center;color:var(--muted);}
  .content-tag{font-size:11px;color:var(--muted);background:#F3F4F6;border-radius:6px;padding:2px 8px;margin-left:8px;}
</style>
</head>
<body>
  <h1>디자인 vs 개발 · 비교 리포트</h1>
  <div class="sub">정답(디자인) 측정 파일과 개발화면 측정 파일을 넣으면, 스타일·크기·위치 차이를 짚어줍니다. 샘플 콘텐츠(지도·리스트 안 내용)는 자동으로 무시합니다.</div>

  <div class="loader">
    <div class="field">
      <label>① 정답 측정 파일 (measure-design.json)</label>
      <input type="file" id="fileDesign" accept="application/json" />
    </div>
    <div class="field">
      <label>② 개발 측정 파일 (measure-dev.json)</label>
      <input type="file" id="fileDev" accept="application/json" />
    </div>
  </div>

  <div id="out"><div class="empty">위에서 두 파일을 선택하면 결과가 나옵니다.</div></div>

<script>
var design=null, dev=null, showDiffOnly=false;

document.getElementById('fileDesign').addEventListener('change', function(e){ load(e.target.files[0], 'design'); });
document.getElementById('fileDev').addEventListener('change', function(e){ load(e.target.files[0], 'dev'); });

function load(file, which){
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var data=JSON.parse(reader.result);
      if(which==='design') design=data; else dev=data;
      render();
    }catch(err){ alert('파일을 읽을 수 없어요: '+err.message); }
  };
  reader.readAsText(file);
}

// ---- 비교 규칙 ----
// 숫자형 판정: [pass한계, warn한계]
var NUM_RULES={
  'box.x':[2,6],'box.y':[2,6],'box.w':[2,6],'box.h':[2,6],
  'fontSize':[0.5,0.5], 'fontWeight':[0,0], 'lineHeight':[1,3],
  'borderRadius':[1,3], 'borderWidth':[0.5,1],
  'paddingTop':[1,3],'paddingRight':[1,3],'paddingBottom':[1,3],'paddingLeft':[1,3],
  'opacity':[0.01,0.05]
};
var STR_KEYS=['color','backgroundColor','borderColor','fontFamily','textAlign'];
var KEY_LABEL={
  'box.x':'가로 위치','box.y':'세로 위치','box.w':'너비','box.h':'높이',
  color:'글자색', backgroundColor:'배경색', fontSize:'글자 크기', fontWeight:'글자 굵기',
  fontFamily:'글꼴', lineHeight:'줄 높이', borderRadius:'모서리 둥글기', borderWidth:'테두리 두께',
  borderColor:'테두리색', paddingTop:'안쪽여백↑', paddingRight:'안쪽여백→', paddingBottom:'안쪽여백↓',
  paddingLeft:'안쪽여백←', textAlign:'정렬', opacity:'투명도'
};

function get(obj, path){
  return path.split('.').reduce(function(o,k){ return o?o[k]:undefined; }, obj);
}
function judgeNum(key, a, b){
  var rule=NUM_RULES[key]||[1,3];
  var d=Math.abs(a-b);
  if(d<=rule[0]) return 'pass';
  if(d<=rule[1]) return 'warn';
  return 'fail';
}
function isColor(k){ return k==='color'||k==='backgroundColor'||k==='borderColor'; }

function render(){
  var out=document.getElementById('out');
  if(!design||!dev){ return; }

  var dMap={}, vMap={};
  design.elements.forEach(function(e){ dMap[e.qa]=e; });
  dev.elements.forEach(function(e){ vMap[e.qa]=e; });

  var allKeys={};
  Object.keys(dMap).forEach(function(k){ allKeys[k]=1; });
  Object.keys(vMap).forEach(function(k){ allKeys[k]=1; });
  var qaList=Object.keys(allKeys).sort();

  var cnt={pass:0,warn:0,fail:0,miss:0};
  var html='';

  qaList.forEach(function(qa){
    var d=dMap[qa], v=vMap[qa];
    var isContent = (d&&d.contentZone)||(v&&v.contentZone);

    // 한쪽에만 있는 요소
    if(!d||!v){
      cnt.miss++;
      var msg = !v ? '개발화면에서 못 찾음 (누락되었거나 이름표 불일치)'
                   : '디자인에 없는 요소 (개발에서 추가됨)';
      html+='<div class="el"><div class="el-head"><div class="name">'+qa+
            '</div><span class="badge miss">확인필요</span></div>'+
            '<div class="note">'+msg+'</div></div>';
      return;
    }

    // 비교할 항목 모으기
    var rows=[], worst='pass';
    function bump(j){ if(j==='fail')worst='fail'; else if(j==='warn'&&worst!=='fail')worst='warn'; }

    // 위치·크기. 글자 요소는 내용 길이 때문에 너비·높이가 달라지므로 위치만 검사.
    var isText = (d.isText)||(v.isText);
    var boxKeys = isText ? ['box.x','box.y'] : ['box.x','box.y','box.w','box.h'];
    boxKeys.forEach(function(k){
      var a=get(d,k), b=get(v,k);
      if(a===undefined||b===undefined) return;
      var j=judgeNum(k, a, b); bump(j);
      rows.push({k:k, label:KEY_LABEL[k], a:a+'px', b:b+'px', j:j});
    });

    if(!isContent){
      // 숫자형 스타일
      ['fontSize','fontWeight','lineHeight','borderRadius','borderWidth','paddingTop','paddingRight','paddingBottom','paddingLeft','opacity'].forEach(function(k){
        var a=d.style?d.style[k]:undefined, b=v.style?v.style[k]:undefined;
        if(a===undefined||b===undefined) return;
        var j=judgeNum(k, a, b); bump(j);
        var unit=(k==='fontWeight'||k==='opacity')?'':'px';
        rows.push({k:k, label:KEY_LABEL[k], a:a+unit, b:b+unit, j:j});
      });
      // 문자형 스타일 (색·글꼴·정렬)
      STR_KEYS.forEach(function(k){
        var a=d.style?d.style[k]:undefined, b=v.style?v.style[k]:undefined;
        if(a===undefined||b===undefined) return;
        var j=(a===b)?'pass':'fail'; bump(j);
        var av=a, bv=b;
        if(isColor(k)){
          av='<span class="swatch" style="background:'+a+'"></span>'+a;
          bv='<span class="swatch" style="background:'+b+'"></span>'+b;
        }
        rows.push({k:k, label:KEY_LABEL[k], a:av, b:bv, j:j, html:true});
      });
    }

    cnt[worst]++;

    // 렌더
    var badge='<span class="badge '+worst+'">'+({pass:'일치',warn:'주의',fail:'불일치'}[worst])+'</span>';
    var ctag = isContent ? '<span class="content-tag">샘플영역·위치/크기만 검사</span>' : '';
    var trs='';
    rows.forEach(function(row){
      if(showDiffOnly && row.j==='pass') return;
      trs+='<tr class="'+row.j+'"><td class="k">'+row.label+'</td>'+
           '<td class="v des">'+row.a+'</td>'+
           '<td class="v dev">'+row.b+'</td>'+
           '<td class="j">'+({pass:'✓',warn:'△',fail:'✕'}[row.j])+'</td></tr>';
    });
    if(!trs) trs='<tr><td class="note" colspan="4">차이 없음</td></tr>';

    html+='<div class="el"><div class="el-head"><div class="name">'+qa+ctag+'</div>'+badge+'</div>'+
          '<table><thead><tr><th>항목</th><th>디자인(정답)</th><th>개발(실제)</th><th style="width:40px">판정</th></tr></thead>'+
          '<tbody>'+trs+'</tbody></table></div>';
  });

  var summary='<div class="summary">'+
    '<div class="chip pass"><div class="n">'+cnt.pass+'</div><div class="t">일치</div></div>'+
    '<div class="chip warn"><div class="n">'+cnt.warn+'</div><div class="t">주의</div></div>'+
    '<div class="chip fail"><div class="n">'+cnt.fail+'</div><div class="t">불일치</div></div>'+
    '<div class="chip"><div class="n">'+cnt.miss+'</div><div class="t">확인필요</div></div>'+
    '</div>'+
    '<div class="toolbar"><label><input type="checkbox" id="diffOnly" '+(showDiffOnly?'checked':'')+'> 차이 있는 항목만 보기</label></div>';

  out.innerHTML=summary+html;
  var cb=document.getElementById('diffOnly');
  if(cb) cb.addEventListener('change', function(e){ showDiffOnly=e.target.checked; render(); });
}
</script>
</body>
</html>
