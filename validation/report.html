<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>디자인 vs 개발 · 검수 리포트</title>
<style>
  :root{
    --pass:#16A34A; --warn:#D97706; --fail:#DC2626; --cascade:#6B7280;
    --bg:#F9FAFB; --card:#fff; --border:#E5E7EB; --text:#1F2937; --muted:#6B7280;
    --font:-apple-system,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);padding:28px 24px;line-height:1.5;max-width:1080px;margin:0 auto;}
  h1{font-size:22px;margin-bottom:4px;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px;}

  .loader{display:flex;gap:20px;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:18px;font-size:12px;}
  .loader label{display:block;color:var(--muted);margin-bottom:4px;}
  .loader .hint{color:var(--muted);}

  .summary{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
  .chip{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:96px;}
  .chip .n{font-size:26px;font-weight:800;line-height:1;}
  .chip .t{font-size:12px;color:var(--muted);margin-top:4px;}
  .chip.fail .n{color:var(--fail);} .chip.warn .n{color:var(--warn);}
  .chip.cascade .n{color:var(--cascade);} .chip.pass .n{color:var(--pass);}
  .verdict{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46;border-radius:10px;padding:12px 16px;margin:14px 0 22px;font-size:14px;font-weight:600;}

  .sec-title{font-size:15px;font-weight:800;margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
  .sec-title .cnt{font-size:12px;font-weight:600;color:var(--muted);background:#F3F4F6;border-radius:999px;padding:2px 9px;}

  .el{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
  .el.fail{border-color:#FCA5A5;} .el.struct{border-color:#FCD34D;background:#FFFBEB;}
  .el-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;}
  .el-head .name{font-weight:700;font-size:14px;font-family:ui-monospace,monospace;}
  .el-head .badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;color:#fff;}
  .badge.fail{background:var(--fail);} .badge.warn{background:var(--warn);}
  .badge.struct{background:#B45309;} .badge.cascade{background:var(--cascade);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:7px 16px;border-top:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;background:#FAFAFA;font-size:12px;}
  td.k{color:var(--muted);width:150px;}
  td.v{font-variant-numeric:tabular-nums;}
  tr.warn td.j{color:var(--warn);font-weight:700;} tr.fail td.j{color:var(--fail);font-weight:700;}
  tr.fail td.v.dev,tr.warn td.v.dev{background:#FEF2F2;}
  tr.cascade td{color:var(--cascade);} tr.cascade td.v.dev{background:#F3F4F6;}
  .swatch{display:inline-block;width:12px;height:12px;border-radius:3px;border:1px solid #0002;vertical-align:middle;margin-right:6px;}
  .note{padding:10px 16px;color:var(--text);font-size:13px;}
  .note b{color:#B45309;}
  .cascade-list{padding:4px 16px 12px;color:var(--muted);font-size:12px;}
  .cascade-list li{list-style:none;padding:2px 0;}
  .tag{font-size:11px;color:var(--muted);background:#F3F4F6;border-radius:6px;padding:2px 8px;margin-left:6px;font-family:var(--font);}
  .collapsed{color:var(--muted);font-size:13px;padding:10px 4px;}
</style>
</head>

  <h1>디자인 vs 개발 · 검수 리포트</h1>
  <div class="sub">피그마 정답값을 그 자리에서 읽어 개발화면 실측과 대조합니다. 샘플 콘텐츠(지도·리스트 안 내용)는 자동 제외, 구조 변화로 인한 '밀림 여파'는 원인 밑으로 묶습니다.</div>

// 입력: design(정답), dev(개발) 측정 객체 → 구조화된 결과 반환

  var NUM = { 'box.x':[2,6],'box.y':[2,6],'box.w':[2,6],'box.h':[2,6],
    fontSize:[0.5,0.5],fontWeight:[0,0],borderRadius:[1,3],borderWidth:[0.5,1],
    paddingTop:[1,3],paddingRight:[1,3],paddingBottom:[1,3],paddingLeft:[1,3],opacity:[0.01,0.05] };
  var LABEL = { 'box.x':'가로 위치','box.y':'세로 위치','box.w':'너비','box.h':'높이',
    color:'글자색',backgroundColor:'배경색',fontSize:'글자 크기',fontWeight:'글자 굵기',
    fontFamily:'글꼴',borderRadius:'모서리 둥글기',borderWidth:'테두리 두께',borderColor:'테두리색',
    paddingTop:'안쪽여백↑',paddingRight:'안쪽여백→',paddingBottom:'안쪽여백↓',paddingLeft:'안쪽여백←' };
  function jn(k,a,b){ var r=NUM[k]||[1,3],d=Math.abs(a-b); return d<=r[0]?'pass':d<=r[1]?'warn':'fail'; }
  function get(o,p){ return p.split('.').reduce(function(x,k){return x?x[k]:undefined;},o); }
  function worst(a,b){ var o={pass:0,warn:1,fail:2}; return o[a]>=o[b]?a:b; }

  function compare(design, dev){
    var dMap={}, vMap={};
    design.elements.forEach(function(e){ dMap[e.qa]=e; });
    dev.elements.forEach(function(e){ vMap[e.qa]=e; });
    var qas = Object.keys(dMap).concat(Object.keys(vMap)).filter(function(v,i,a){return a.indexOf(v)===i;}).sort();

    var added=[], removed=[];
    qas.forEach(function(qa){
      if(!dMap[qa]) added.push(vMap[qa]);
      else if(!vMap[qa]) removed.push(dMap[qa]);
    });

    var elems=[];
    qas.forEach(function(qa){
      var d=dMap[qa], v=vMap[qa];
      if(!d||!v){
        elems.push({ qa:qa, kind:'struct', where: d?'개발에서 누락됨':'개발에 추가됨(디자인에 없음)', rows:[] });
        return;
      }
      var isText=d.isText||v.isText, isContent=d.contentZone||v.contentZone;
      var dY = v.box.y - d.box.y;
      // 밀림 여파: 위에 추가된 요소가 있고, 세로로 밀렸으면 -> 여파로 표시
      var cascadeY = (dY>6) && added.some(function(a){ return a.box.y < v.box.y; });
      var rows=[];

      // 위치·크기
      var posKeys = isText? ['box.x','box.y'] : ['box.x','box.y','box.w','box.h'];
      posKeys.forEach(function(k){
        var a=get(d,k), b=get(v,k); if(a==null||b==null) return;
        var j=jn(k,a,b);
        var cascade = (k==='box.y' && cascadeY && j!=='pass');
        rows.push({ k:k, label:LABEL[k], a:a, b:b, unit:'px', j:j, cascade:cascade });
      });

      if(!isContent){
        if(isText){
          rows.push({k:'color',label:LABEL.color,a:d.style.color,b:v.style.color,j:d.style.color===v.style.color?'pass':'fail',str:true});
          rows.push({k:'fontSize',label:LABEL.fontSize,a:d.style.fontSize,b:v.style.fontSize,unit:'px',j:jn('fontSize',d.style.fontSize,v.style.fontSize)});
          rows.push({k:'fontWeight',label:LABEL.fontWeight,a:d.style.fontWeight,b:v.style.fontWeight,j:jn('fontWeight',d.style.fontWeight,v.style.fontWeight)});
          rows.push({k:'fontFamily',label:LABEL.fontFamily,a:d.style.fontFamily,b:v.style.fontFamily,j:d.style.fontFamily===v.style.fontFamily?'pass':'fail',str:true});
        } else {
          rows.push({k:'backgroundColor',label:LABEL.backgroundColor,a:d.style.backgroundColor,b:v.style.backgroundColor,j:d.style.backgroundColor===v.style.backgroundColor?'pass':'fail',str:true,color:true});
          rows.push({k:'borderRadius',label:LABEL.borderRadius,a:d.style.borderRadius,b:v.style.borderRadius,unit:'px',j:jn('borderRadius',d.style.borderRadius,v.style.borderRadius)});
          rows.push({k:'borderWidth',label:LABEL.borderWidth,a:d.style.borderWidth,b:v.style.borderWidth,unit:'px',j:jn('borderWidth',d.style.borderWidth,v.style.borderWidth)});
          if(d.style.borderWidth>0 && v.style.borderWidth>0)
            rows.push({k:'borderColor',label:LABEL.borderColor,a:d.style.borderColor,b:v.style.borderColor,j:d.style.borderColor===v.style.borderColor?'pass':'fail',str:true,color:true});
          ['paddingTop','paddingRight','paddingBottom','paddingLeft'].forEach(function(p){
            rows.push({k:p,label:LABEL[p],a:d.style[p],b:v.style[p],unit:'px',j:jn(p,d.style[p],v.style[p])});
          });
        }
      }

      // 상태 판정: 여파(cascade) 행은 제외하고 최악값
      var st='pass', hasCascade=false;
      rows.forEach(function(r){
        if(r.cascade){ hasCascade=true; return; }
        st=worst(st,r.j);
      });
      elems.push({ qa:qa, kind:'compare', isText:isText, isContent:isContent, status:st, hasCascade:hasCascade, cascadeFrom: hasCascade?(added[0]&&added[0].qa):null, rows:rows });
    });

    return { elems:elems, added:added, removed:removed };
  }

var design = DEFAULT_DESIGN, dev = DEFAULT_DEV;

document.getElementById('fileDesign').addEventListener('change', function(e){ load(e.target.files[0],'design'); });
document.getElementById('fileDev').addEventListener('change', function(e){ load(e.target.files[0],'dev'); });
function load(file, which){
  if(!file) return;
  var rd=new FileReader();
  rd.onload=function(){ try{ var d=JSON.parse(rd.result); if(which==='design')design=d; else dev=d; render(); }catch(err){ alert('파일을 읽을 수 없어요: '+err.message); } };
  rd.readAsText(file);
}

function esc(s){ return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
function cell(row, val){
  if(row.color){ return '<span class="swatch" style="background:'+esc(val)+'"></span>'+esc(val); }
  return esc(val) + (row.unit && typeof val==='number' ? row.unit : '');
}
function rowsTable(rows, diffOnly){
  var trs='';
  rows.forEach(function(r){
    if(diffOnly && r.j==='pass' && !r.cascade) return;
    var cls = r.cascade ? 'cascade' : r.j;
    var mark = r.cascade ? '↓밀림' : ({pass:'✓',warn:'△',fail:'✕'}[r.j]);
    trs += '<tr class="'+cls+'"><td class="k">'+esc(r.label)+(r.cascade?'<span class="tag">여파</span>':'')+'</td>'+
           '<td class="v des">'+cell(r,r.a)+'</td><td class="v dev">'+cell(r,r.b)+'</td>'+
           '<td class="j" style="width:52px">'+mark+'</td></tr>';
  });
  if(!trs) trs='<tr><td class="note" colspan="4">차이 없음</td></tr>';
  return '<table><thead><tr><th>항목</th><th>정답(디자인)</th><th>개발(실제)</th><th>판정</th></tr></thead><tbody>'+trs+'</tbody></table>';
}

function render(){
  var out=document.getElementById('out');
  var R = compare(design, dev);
  var fails=[], warns=[], cascades=[], structs=[], cleanN=0;
  R.elems.forEach(function(e){
    if(e.kind==='struct'){ structs.push(e); return; }
    if(e.status==='fail') fails.push(e);
    else if(e.status==='warn') warns.push(e);
    else if(e.hasCascade) cascades.push(e);
    else cleanN++;
  });

  var html='';
  // 요약
  html+='<div class="summary">'+
    '<div class="chip fail"><div class="n">'+fails.length+'</div><div class="t">실제 문제</div></div>'+
    '<div class="chip struct" style="border-color:#FCD34D"><div class="n" style="color:#B45309">'+structs.length+'</div><div class="t">구조 차이</div></div>'+
    '<div class="chip cascade"><div class="n">'+cascades.length+'</div><div class="t">밀림 여파</div></div>'+
    '<div class="chip warn"><div class="n">'+warns.length+'</div><div class="t">주의(미세)</div></div>'+
    '<div class="chip pass"><div class="n">'+cleanN+'</div><div class="t">완전 일치</div></div>'+
    '</div>';

  var totalProblems = fails.length + structs.length;
  html+='<div class="verdict">✅ 실제 문제 '+totalProblems+'곳을 자동 검출했습니다. 밀림 여파 '+cascades.length+'곳은 아래 원인 밑으로 묶었습니다.</div>';

  // 구조 차이 (+여파)
  if(structs.length){
    html+='<div class="sec-title">🧩 구조 차이 <span class="cnt">'+structs.length+'</span></div>';
    structs.forEach(function(e){
      html+='<div class="el struct"><div class="el-head"><div class="name">'+esc(e.qa)+'</div><span class="badge struct">'+(e.where.indexOf('추가')>=0?'추가됨':'누락됨')+'</span></div>';
      html+='<div class="note"><b>'+esc(e.where)+'</b></div>';
      if(cascades.length){
        html+='<div class="cascade-list">↓ 이 변화로 아래 요소들이 밀려 내려갔어요 (여파, 개별 오류로 세지 않음):<ul>';
        cascades.forEach(function(c){ html+='<li>· '+esc(c.qa)+'</li>'; });
        html+='</ul></div>';
      }
      html+='</div>';
    });
  }

  // 실제 문제
  if(fails.length){
    html+='<div class="sec-title">🔴 실제 문제 <span class="cnt">'+fails.length+'</span></div>';
    fails.forEach(function(e){ html+=elCard(e,'fail'); });
  }
  // 주의
  if(warns.length){
    html+='<div class="sec-title">🟡 주의 (미세 차이) <span class="cnt">'+warns.length+'</span></div>';
    warns.forEach(function(e){ html+=elCard(e,'warn'); });
  }
  // 일치
  html+='<div class="sec-title">✅ 완전 일치 <span class="cnt">'+cleanN+'</span></div>';
  html+='<div class="collapsed">문제 없는 요소 '+cleanN+'개는 접어뒀어요.</div>';

  out.innerHTML=html;
}
function elCard(e,badge){
  var b='<span class="badge '+badge+'">'+(badge==='fail'?'불일치':'주의')+'</span>';
  var ctag = e.isContent ? '<span class="tag">샘플영역·위치만</span>' : '';
  return '<div class="el '+badge+'"><div class="el-head"><div class="name">'+esc(e.qa)+ctag+'</div>'+b+'</div>'+rowsTable(e.rows,true)+'</div>';
}
render();
