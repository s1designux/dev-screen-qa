<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<style>
  :root{
    --pass:#16A34A; --warn:#D97706; --fail:#DC2626; --cascade:#6B7280;
    --bg:#F9FAFB; --card:#fff; --border:#E5E7EB; --text:#1F2937; --muted:#6B7280; --accent:#2563EB;
    --font:-apple-system,"Segoe UI","Malgun Gothic",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;padding:14px;}
  h1{font-size:16px;margin-bottom:2px;}
  .sub{color:var(--muted);font-size:12px;margin-bottom:14px;}

  .step{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;}
  .step .lab{font-weight:700;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .step .lab .num{background:var(--accent);color:#fff;width:18px;height:18px;border-radius:999px;font-size:11px;display:inline-flex;align-items:center;justify-content:center;}
  .status{font-size:12px;color:var(--muted);margin:6px 0;}
  .status.ok{color:var(--pass);font-weight:600;} .status.bad{color:var(--fail);}
  .hint{font-size:11px;color:var(--muted);margin-top:6px;}
  code{background:#F3F4F6;border-radius:4px;padding:1px 5px;font-family:ui-monospace,monospace;font-size:11px;}

  button{font-family:var(--font);font-size:12px;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:600;}
  .btn{background:var(--accent);color:#fff;} .btn:disabled{background:#9CA3AF;cursor:default;}
  .btn.big{width:100%;padding:11px;font-size:13px;margin-top:8px;}
  .drop{border:1.5px dashed var(--border);border-radius:8px;padding:14px;text-align:center;color:var(--muted);font-size:12px;cursor:pointer;background:#FAFAFA;}
  .drop.over{border-color:var(--accent);background:#EFF6FF;color:var(--accent);}
  input[type=file]{display:none;}

  /* 짝 확인 */
  .pair{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;background:#fff;font-size:12px;}
  .pair.low{border-color:#FCD34D;background:#FFFBEB;}
  .pair input[type=checkbox]{width:15px;height:15px;flex:none;}
  .pair .side{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pair .fig{font-family:ui-monospace,monospace;color:var(--text);}
  .pair .arrow{color:var(--muted);flex:none;}
  .pair .dev{color:var(--muted);}
  .pair .conf{flex:none;font-weight:700;font-size:11px;padding:1px 7px;border-radius:999px;}
  .conf.hi{background:#DCFCE7;color:#166534;} .conf.mid{background:#FEF9C3;color:#854D0E;} .conf.lo{background:#FEE2E2;color:#991B1B;}
  .unmatched{font-size:12px;color:var(--muted);padding:6px 9px;border:1px dashed var(--border);border-radius:8px;margin-bottom:5px;background:#FAFAFA;display:flex;align-items:center;gap:8px;}
  .unmatched .fig{font-family:ui-monospace,monospace;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  select{font-family:var(--font);font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:6px;max-width:150px;}
  .mini{font-size:11px;color:var(--muted);margin:8px 0 4px;font-weight:700;}

  .warn-banner{background:#FEF3C7;border:1px solid #FCD34D;color:#92400E;border-radius:8px;padding:9px 12px;font-size:12px;margin-bottom:10px;}
  .summary{display:flex;gap:7px;margin:12px 0 6px;flex-wrap:wrap;}
  .chip{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 10px;min-width:58px;flex:1;text-align:center;}
  .chip .n{font-size:20px;font-weight:800;line-height:1;} .chip .t{font-size:10px;color:var(--muted);margin-top:3px;}
  .chip.fail .n{color:var(--fail);} .chip.warn .n{color:var(--warn);} .chip.cascade .n{color:var(--cascade);} .chip.pass .n{color:var(--pass);} .chip.struct .n{color:#B45309;}
  .verdict{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46;border-radius:8px;padding:10px 12px;margin:6px 0 14px;font-size:12px;font-weight:600;}
  .sec-title{font-size:13px;font-weight:800;margin:16px 0 8px;display:flex;align-items:center;gap:6px;}
  .sec-title .cnt{font-size:11px;font-weight:600;color:var(--muted);background:#F3F4F6;border-radius:999px;padding:1px 8px;}
  .el{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:9px;overflow:hidden;}
  .el.fail{border-color:#FCA5A5;} .el.struct{border-color:#FCD34D;background:#FFFBEB;}
  .el-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;}
  .el-head .name{font-weight:700;font-size:12px;font-family:ui-monospace,monospace;word-break:break-all;}
  .el-head .badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;color:#fff;white-space:nowrap;}
  .badge.fail{background:var(--fail);} .badge.warn{background:var(--warn);} .badge.struct{background:#B45309;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th,td{text-align:left;padding:6px 12px;border-top:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;background:#FAFAFA;font-size:11px;}
  td.k{color:var(--muted);width:92px;} td.v{font-variant-numeric:tabular-nums;}
  tr.warn td.j{color:var(--warn);font-weight:700;} tr.fail td.j{color:var(--fail);font-weight:700;}
  tr.fail td.v.dev,tr.warn td.v.dev{background:#FEF2F2;}
  tr.cascade td{color:var(--cascade);} tr.cascade td.v.dev{background:#F3F4F6;}
  .swatch{display:inline-block;width:11px;height:11px;border-radius:3px;border:1px solid #0002;vertical-align:middle;margin-right:5px;}
  .note{padding:9px 12px;font-size:12px;} .note b{color:#B45309;}
  .tag{font-size:10px;color:var(--muted);background:#F3F4F6;border-radius:5px;padding:1px 6px;margin-left:5px;}
  .collapsed{color:var(--muted);font-size:12px;padding:8px 2px;}
  .empty{color:var(--muted);font-size:12px;text-align:center;padding:20px 12px;background:var(--card);border:1px dashed var(--border);border-radius:10px;}
</style>
</head>
<body>
  <h1>값 검수 · 디자인 ↔ 개발</h1>
  <div class="sub">피그마 정답값을 라이브로 읽어 개발 실측과 대조. 이름표 없이 자동 짝맞춤. 외부 통신 없음.</div>

  <div class="step">
    <div class="lab"><span class="num">1</span> 정답 프레임 (피그마)</div>
    <div class="status" id="selStatus">피그마에서 정답이 될 화면 프레임을 선택하세요.</div>
    <button class="btn" id="readBtn" disabled>정답 값 읽기</button>
    <div class="status" id="designStatus"></div>
  </div>

  <div class="step">
    <div class="lab"><span class="num">2</span> 개발 측정 파일</div>
    <div class="drop" id="drop">여기에 <b>measure-dev.json</b>을 끌어다 놓거나 클릭해서 고르기<br/><span class="hint">개발자가 collect.js를 콘솔에 딱 1번 붙여넣으면 나오는 파일 (태그 불필요)</span></div>
    <input type="file" id="fileDev" accept="application/json" />
    <div class="status" id="devStatus"></div>
  </div>

  <div class="step" id="matchStep" style="display:none">
    <div class="lab"><span class="num">3</span> 짝 확인 <span style="font-weight:400;color:var(--muted);font-size:11px">— 자동으로 맞췄어요. 틀린 것만 손보세요</span></div>
    <div id="matchArea"></div>
    <button class="btn big" id="compareBtn">✔ 확인했어요 · 값 대조하기</button>
  </div>

  <div id="warnArea"></div>
  <div id="out"><div class="empty">정답과 개발 측정이 준비되면 짝 확인 단계가 나와요.</div></div>

<script>
/* ================= 대조 규칙 ================= */
var NUM = { 'box.x':[2,6],'box.y':[2,6],'box.w':[2,6],'box.h':[2,6],
  fontSize:[0.5,0.5],fontWeight:[0,0],borderRadius:[1,3],borderWidth:[0.5,1],
  paddingTop:[1,3],paddingRight:[1,3],paddingBottom:[1,3],paddingLeft:[1,3],opacity:[0.01,0.05] };
var LABEL = { 'box.x':'가로 위치','box.y':'세로 위치','box.w':'너비','box.h':'높이',
  color:'글자색',backgroundColor:'배경색',fontSize:'글자 크기',fontWeight:'글자 굵기',fontFamily:'글꼴',
  borderRadius:'모서리 둥글기',borderWidth:'테두리 두께',borderColor:'테두리색',
  paddingTop:'안쪽여백↑',paddingRight:'안쪽여백→',paddingBottom:'안쪽여백↓',paddingLeft:'안쪽여백←' };
function jn(k,a,b){ var r=NUM[k]||[1,3],d=Math.abs(a-b); return d<=r[0]?'pass':d<=r[1]?'warn':'fail'; }
function getp(o,p){ return p.split('.').reduce(function(x,k){return x?x[k]:undefined;},o); }
function worstOf(a,b){ var o={pass:0,warn:1,fail:2}; return o[a]>=o[b]?a:b; }

function compareRows(d, v, cascadeY){
  var isText=d.isText||v.isText, isContent=d.contentZone||v.contentZone;
  var rows=[];
  var posKeys = isText? ['box.x','box.y'] : ['box.x','box.y','box.w','box.h'];
  posKeys.forEach(function(k){
    var a=getp(d,k), b=getp(v,k); if(a==null||b==null) return;
    var j=jn(k,a,b); var cascade=(k==='box.y' && cascadeY && j!=='pass');
    rows.push({k:k,label:LABEL[k],a:a,b:b,unit:'px',j:j,cascade:cascade});
  });
  if(!isContent){
    if(isText){
      rows.push({k:'color',label:LABEL.color,a:d.style.color,b:v.style.color,j:d.style.color===v.style.color?'pass':'fail',color:true});
      rows.push({k:'fontSize',label:LABEL.fontSize,a:d.style.fontSize,b:v.style.fontSize,unit:'px',j:jn('fontSize',d.style.fontSize,v.style.fontSize)});
      rows.push({k:'fontWeight',label:LABEL.fontWeight,a:d.style.fontWeight,b:v.style.fontWeight,j:jn('fontWeight',d.style.fontWeight,v.style.fontWeight)});
      rows.push({k:'fontFamily',label:LABEL.fontFamily,a:d.style.fontFamily,b:v.style.fontFamily,j:d.style.fontFamily===v.style.fontFamily?'pass':'fail'});
    } else {
      rows.push({k:'backgroundColor',label:LABEL.backgroundColor,a:d.style.backgroundColor,b:v.style.backgroundColor,j:d.style.backgroundColor===v.style.backgroundColor?'pass':'fail',color:true});
      rows.push({k:'borderRadius',label:LABEL.borderRadius,a:d.style.borderRadius,b:v.style.borderRadius,unit:'px',j:jn('borderRadius',d.style.borderRadius,v.style.borderRadius)});
      rows.push({k:'borderWidth',label:LABEL.borderWidth,a:d.style.borderWidth,b:v.style.borderWidth,unit:'px',j:jn('borderWidth',d.style.borderWidth,v.style.borderWidth)});
      if(d.style.borderWidth>0 && v.style.borderWidth>0)
        rows.push({k:'borderColor',label:LABEL.borderColor,a:d.style.borderColor,b:v.style.borderColor,j:d.style.borderColor===v.style.borderColor?'pass':'fail',color:true});
      ['paddingTop','paddingRight','paddingBottom','paddingLeft'].forEach(function(p){
        rows.push({k:p,label:LABEL[p],a:d.style[p],b:v.style[p],unit:'px',j:jn(p,d.style[p],v.style[p])});
      });
    }
  }
  var st='pass', hasCascade=false;
  rows.forEach(function(rr){ if(rr.cascade){ hasCascade=true; return; } st=worstOf(st,rr.j); });
  return { rows:rows, status:st, hasCascade:hasCascade, isText:isText, isContent:isContent };
}

/* ================= 자동 짝맞춤 ================= */
function norm(s){ return (s||'').toLowerCase().replace(/[\s\.,#·\[\]（）()！!？?～~・]/g,''); }
function bigrams(s){ var o={},n=0; for(var i=0;i<s.length-1;i++){o[s.substr(i,2)]=1;n++;} return {set:o,n:Math.max(1,n)}; }
function textSim(a,b){ a=norm(a);b=norm(b); if(!a&&!b)return 0.5; if(!a||!b)return 0.15; if(a===b)return 1;
  if(a.indexOf(b)>=0||b.indexOf(a)>=0)return 0.85; var A=bigrams(a),B=bigrams(b),i=0; for(var k in A.set){if(B.set[k])i++;} return i/(A.n+B.n-i); }
function matchScore(f,d,FW,FH,DW,DH){
  var t=textSim(f.text,d.text), ty=(f.isText===d.isText)?1:0, bothText=f.isText&&d.isText;
  var dist=Math.hypot(f.box.x/FW-d.box.x/DW, f.box.y/FH-d.box.y/DH);
  var pos=Math.max(0,1-dist/0.4);
  var hr=Math.min(f.box.h,d.box.h)/Math.max(f.box.h,d.box.h), wr=Math.min(f.box.w,d.box.w)/Math.max(f.box.w,d.box.w);
  var size=bothText?hr:wr*hr;
  return 0.30*t+0.10*ty+0.35*pos+0.25*size;
}
function runMatcher(design, dev){
  var FW=design.meta.artboardWidth, FH=design.meta.artboardHeight||FW;
  var DW=dev.meta.artboardWidth, DH=dev.meta.artboardHeight||DW;
  var fig=design.elements;
  // 개발쪽 최외곽 컨테이너 제외
  var devEls=dev.elements.filter(function(e){ return !(e.box.x<=1&&e.box.y<=1&&e.box.w>=DW-2&&e.box.h>=DH-2); });
  var pairsAll=[];
  fig.forEach(function(f,fi){ devEls.forEach(function(d,di){ pairsAll.push({fi:fi,di:di,s:matchScore(f,d,FW,FH,DW,DH)}); }); });
  pairsAll.sort(function(a,b){return b.s-a.s;});
  var fU={},dU={},pairs=[];
  pairsAll.forEach(function(p){ if(p.s<0.5)return; if(fU[p.fi]||dU[p.di])return; fU[p.fi]=1;dU[p.di]=1; pairs.push({fi:p.fi,di:p.di,s:p.s,confirmed:true}); });
  var unmatchedF=[], unmatchedD=[];
  fig.forEach(function(f,fi){ if(!fU[fi]) unmatchedF.push(fi); });
  devEls.forEach(function(d,di){ if(!dU[di]) unmatchedD.push(di); });
  return { fig:fig, devEls:devEls, pairs:pairs, unmatchedF:unmatchedF, unmatchedD:unmatchedD };
}

/* ================= 상태 ================= */
var design=null, dev=null, M=null;
function parentPost(m){ parent.postMessage({ pluginMessage:m }, '*'); }
function esc(s){ return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

/* ================= 짝 확인 UI ================= */
function shortDev(d){ return d.text ? d.text : '('+(d.isText?'글자':'상자')+' '+d.box.w+'×'+d.box.h+')'; }
function shortFig(f){ return (f.name && f.name.indexOf('/')>=0) ? f.name : (f.text || (f.isText?'글자':'상자')); }

function renderMatch(){
  document.getElementById('matchStep').style.display='block';
  var el=document.getElementById('matchArea'), html='';
  M.pairs.sort(function(a,b){return b.s-a.s;});
  html+='<div class="mini">자동 짝 ('+M.pairs.length+') — 체크 켜진 것만 대조에 씀</div>';
  M.pairs.forEach(function(p,pi){
    var f=M.fig[p.fi], d=M.devEls[p.di], pct=Math.round(p.s*100);
    var cc = p.s>=0.75?'hi':(p.s>=0.6?'mid':'lo');
    var low = p.s<0.7?' low':'';
    html+='<div class="pair'+low+'">'+
      '<input type="checkbox" '+(p.confirmed?'checked':'')+' onchange="M.pairs['+pi+'].confirmed=this.checked">'+
      '<span class="side fig" title="'+esc(shortFig(f))+'">'+esc(shortFig(f))+'</span>'+
      '<span class="arrow">↔</span>'+
      '<span class="side dev" title="'+esc(shortDev(d))+'">'+esc(shortDev(d))+'</span>'+
      '<span class="conf '+cc+'">'+pct+'%</span></div>';
  });
  if(M.unmatchedF.length){
    html+='<div class="mini">짝 못 찾은 정답 요소 ('+M.unmatchedF.length+') — 직접 고르거나 그냥 두면 "개발에서 못 찾음"으로 표시</div>';
    M.unmatchedF.forEach(function(fi){
      var f=M.fig[fi];
      var opts='<option value="">— 개발에서 못 찾음 —</option>';
      M.unmatchedD.forEach(function(di){ opts+='<option value="'+di+'">'+esc(shortDev(M.devEls[di]))+'</option>'; });
      html+='<div class="unmatched"><span class="fig" title="'+esc(shortFig(f))+'">'+esc(shortFig(f))+'</span>'+
        '<select data-fi="'+fi+'" class="manualPick">'+opts+'</select></div>';
    });
  }
  el.innerHTML=html;
}

/* ================= 대조 실행 ================= */
function doCompare(){
  // 수동 지정 반영
  var picks=document.querySelectorAll('.manualPick');
  var manual=[];
  picks.forEach(function(sel){ if(sel.value!==''){ manual.push({fi:parseInt(sel.getAttribute('data-fi'),10), di:parseInt(sel.value,10)}); } });
  var confirmed = M.pairs.filter(function(p){return p.confirmed;}).map(function(p){return {fi:p.fi,di:p.di};}).concat(manual);

  var usedD={}, usedF={};
  var pairedFigBoxes=[], pairedDevBoxes=[];
  confirmed.forEach(function(p){ usedD[p.di]=1; usedF[p.fi]=1; pairedFigBoxes.push(M.fig[p.fi].box); pairedDevBoxes.push(M.devEls[p.di].box); });
  // 이미 짝지어진 상자 '안에' 들어있는가 (그 상자가 매칭됐으면 그 안 요소는 커버된 것)
  function insideAny(box, boxes){
    return boxes.some(function(b){ return b!==box && box.x>=b.x-2 && box.y>=b.y-2 && box.x+box.w<=b.x+b.w+2 && box.y+box.h<=b.y+b.h+2 && (b.w*b.h > box.w*box.h); });
  }
  // 남은 개발 요소(디자인에 없는 것) — 밀림 여파 원인 후보 & 추가 의심
  var leftoverD = M.devEls.filter(function(d,di){ return !usedD[di]; });
  var addedSuspect = leftoverD.filter(function(d){
    var structural = (d.style.backgroundColor && d.style.backgroundColor!=='rgba(0, 0, 0, 0)') || d.style.borderWidth>0;
    return structural && !insideAny(d.box, pairedDevBoxes);
  });
  var missingF = M.fig.filter(function(f,fi){ return !usedF[fi] && !insideAny(f.box, pairedFigBoxes); });

  var fails=[],warns=[],cascades=[],cleanN=0;
  confirmed.forEach(function(p){
    var f=M.fig[p.fi], d=M.devEls[p.di];
    var dY=d.box.y-f.box.y;
    var cascadeY=(dY>6) && leftoverD.some(function(x){ return x.box.y < d.box.y; });
    var res=compareRows(f, d, cascadeY);
    var item={ name:shortFig(f), isContent:res.isContent, status:res.status, hasCascade:res.hasCascade, rows:res.rows };
    if(res.status==='fail') fails.push(item);
    else if(res.status==='warn') warns.push(item);
    else if(res.hasCascade) cascades.push(item);
    else cleanN++;
  });

  renderReport(fails, warns, cascades, cleanN, missingF, addedSuspect);
}

function cell(row,val){ if(row.color){ return '<span class="swatch" style="background:'+esc(val)+'"></span>'+esc(val); } return esc(val)+(row.unit&&typeof val==='number'?row.unit:''); }
function rowsTable(rows){
  var trs='';
  rows.forEach(function(r){
    if(r.j==='pass'&&!r.cascade) return;
    var cls=r.cascade?'cascade':r.j, mark=r.cascade?'↓밀림':({pass:'✓',warn:'△',fail:'✕'}[r.j]);
    trs+='<tr class="'+cls+'"><td class="k">'+esc(r.label)+(r.cascade?'<span class="tag">여파</span>':'')+'</td>'+
         '<td class="v des">'+cell(r,r.a)+'</td><td class="v dev">'+cell(r,r.b)+'</td><td class="j" style="width:44px">'+mark+'</td></tr>';
  });
  if(!trs) trs='<tr><td class="note" colspan="4">차이 없음</td></tr>';
  return '<table><thead><tr><th>항목</th><th>정답</th><th>개발</th><th>판정</th></tr></thead><tbody>'+trs+'</tbody></table>';
}
function elCard(e,badge){
  var b='<span class="badge '+badge+'">'+(badge==='fail'?'불일치':'주의')+'</span>';
  var ctag=e.isContent?'<span class="tag">샘플·위치만</span>':'';
  return '<div class="el '+badge+'"><div class="el-head"><div class="name">'+esc(e.name)+ctag+'</div>'+b+'</div>'+rowsTable(e.rows)+'</div>';
}

function renderReport(fails, warns, cascades, cleanN, missingF, addedSuspect){
  var out=document.getElementById('out');
  var wa=document.getElementById('warnArea'); wa.innerHTML='';
  var dw=design.meta.artboardWidth, vw=dev.meta.artboardWidth;
  if(dw&&vw&&Math.abs(dw-vw)>1) wa.innerHTML='<div class="warn-banner">⚠️ 측정 폭이 달라요 — 정답 '+dw+'px · 개발 '+vw+'px. 같은 폭에서 잰 값끼리 비교해야 정확해요.</div>';

  var structN=missingF.length+addedSuspect.length;
  var html='<div class="summary">'+
    '<div class="chip fail"><div class="n">'+fails.length+'</div><div class="t">실제 문제</div></div>'+
    '<div class="chip struct"><div class="n">'+structN+'</div><div class="t">구조 차이</div></div>'+
    '<div class="chip cascade"><div class="n">'+cascades.length+'</div><div class="t">밀림 여파</div></div>'+
    '<div class="chip warn"><div class="n">'+warns.length+'</div><div class="t">주의</div></div>'+
    '<div class="chip pass"><div class="n">'+cleanN+'</div><div class="t">일치</div></div></div>';
  html+='<div class="verdict">✅ 실제 문제 '+(fails.length+structN)+'곳 검출'+(cascades.length?(' · 밀림 여파 '+cascades.length+'곳은 원인 밑으로 묶음'):'')+'.</div>';

  if(structN){
    html+='<div class="sec-title">🧩 구조 차이 <span class="cnt">'+structN+'</span></div>';
    addedSuspect.forEach(function(d){
      html+='<div class="el struct"><div class="el-head"><div class="name">'+esc(shortDev(d))+'</div><span class="badge struct">추가?</span></div>'+
        '<div class="note"><b>디자인에 없는 요소가 개발에 있어요</b>'+(cascades.length?' — 이것 때문에 아래가 밀렸을 수 있어요':'')+'</div></div>';
    });
    missingF.forEach(function(f){
      html+='<div class="el struct"><div class="el-head"><div class="name">'+esc(shortFig(f))+'</div><span class="badge struct">못 찾음</span></div>'+
        '<div class="note"><b>정답에 있는데 개발에서 못 찾았어요</b> — 누락이거나 짝맞춤 실패일 수 있어요</div></div>';
    });
  }
  if(fails.length){ html+='<div class="sec-title">🔴 실제 문제 <span class="cnt">'+fails.length+'</span></div>'; fails.forEach(function(e){ html+=elCard(e,'fail'); }); }
  if(warns.length){ html+='<div class="sec-title">🟡 주의 (미세) <span class="cnt">'+warns.length+'</span></div>'; warns.forEach(function(e){ html+=elCard(e,'warn'); }); }
  html+='<div class="sec-title">✅ 완전 일치 <span class="cnt">'+cleanN+'</span></div><div class="collapsed">문제 없는 요소 '+cleanN+'개는 접어뒀어요.</div>';
  out.innerHTML=html;
  out.scrollIntoView({behavior:'smooth'});
}

/* ================= 준비되면 짝맞춤 실행 ================= */
function maybeMatch(){
  if(design && dev){ M=runMatcher(design, dev); renderMatch(); document.getElementById('out').innerHTML='<div class="empty">위에서 짝을 확인하고 "값 대조하기"를 누르세요.</div>'; }
}

/* ================= 이벤트 ================= */
document.getElementById('readBtn').onclick=function(){
  var s=document.getElementById('designStatus'); s.className='status'; s.textContent='읽는 중…';
  parentPost({ type:'read-design' });
};
document.getElementById('compareBtn').onclick=doCompare;

var fileInput=document.getElementById('fileDev'), drop=document.getElementById('drop');
drop.onclick=function(){ fileInput.click(); };
fileInput.onchange=function(e){ if(e.target.files[0]) loadDev(e.target.files[0]); };
drop.ondragover=function(e){ e.preventDefault(); drop.className='drop over'; };
drop.ondragleave=function(){ drop.className='drop'; };
drop.ondrop=function(e){ e.preventDefault(); drop.className='drop'; if(e.dataTransfer.files[0]) loadDev(e.dataTransfer.files[0]); };
function loadDev(file){
  var rd=new FileReader();
  rd.onload=function(){
    try{ var d=JSON.parse(rd.result); if(!d.elements) throw new Error('measure 파일 형식이 아니에요'); dev=d;
      var st=document.getElementById('devStatus'); st.className='status ok';
      st.textContent='✅ 개발 측정: '+d.elements.length+'개 요소'+(d.meta&&d.meta.artboardWidth?' · 폭 '+d.meta.artboardWidth+'px':'');
      maybeMatch();
    }catch(err){ var st=document.getElementById('devStatus'); st.className='status bad'; st.textContent='파일을 읽을 수 없어요: '+err.message; }
  };
  rd.readAsText(file);
}

onmessage=function(event){
  var msg=event.data.pluginMessage; if(!msg) return;
  if(msg.type==='selection'){
    var el=document.getElementById('selStatus'), btn=document.getElementById('readBtn');
    if(msg.node && msg.node.selectable){ el.textContent='선택됨: '+msg.node.name; btn.disabled=false; }
    else if(msg.node){ el.textContent='"'+msg.node.name+'"은 프레임이 아니에요. 화면 전체 프레임을 골라주세요.'; btn.disabled=true; }
    else { el.textContent='피그마에서 정답이 될 화면 프레임을 선택하세요.'; btn.disabled=true; }
  }
  else if(msg.type==='design-read'){
    var st=document.getElementById('designStatus');
    if(msg.error){ st.className='status bad'; st.textContent='⚠️ '+msg.error; return; }
    design=msg.data; st.className='status ok';
    st.textContent='✅ 정답 읽음: '+msg.data.meta.frameName+' · '+msg.data.elements.length+'개 요소 · 폭 '+msg.data.meta.artboardWidth+'px';
    maybeMatch();
  }
};
parentPost({ type:'init' });
</script>
</body>
</html>
